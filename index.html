<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick - Cook</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 
</head>
<body>
    <div id="app-container">
        
        <main id="home-screen" class="screen active">
            <header>
                <h1>Quick - Cook</h1>
            </header>
            <div id="welcome-message"></div>
            <h2 id="recent-title">Historial</h2>

            <div id="recent-video-list" class="horizontal-slider"></div>
            <div id="filters-container"></div>
            <div id="video-list" class="vertical-list"></div> 
        </main>

        <main id="player-screen" class="screen">
            <button id="btn-back" class="back-btn">
                <i class="fa-solid fa-chevron-left"></i> Atrás
            </button>
            <h2 id="player-title">Títol del vídeo</h2>
            
            <button id="btn-like" class="action-btn">
                <i class="fa-regular fa-heart"></i> Me Gusta
            </button>
            
            <div class="video-container">
                <video id="main-video" playsinline></video>
                
                <div class="custom-controls">
                    <button id="btn-play-pause" class="control-btn"></button>
                    <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
                    <div class="time-display">
                        <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
                    </div>
                    <button id="btn-mute" class="control-btn"></button>
                    <input type="range" id="volume-slider" value="1" min="0" max="1" step="0.05">
                </div>
            </div>

            <div id="player-category" class="category-badge"></div>

            <div class="description-box">
                <p><strong>Descripcion: </strong> <span id="player-desc"></span></p>
            </div>
        </main>

        <main id="profile-screen" class="screen">
            <header>
                <h1>El Meu Perfil</h1>
            </header>
            
            <div class="profile-container">
                <div class="profile-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                
                <form id="profile-form">
                    <div class="form-group">
                        <label for="prof-nom">Nom:</label>
                        <input type="text" id="prof-nom" placeholder="El teu nom" disabled>
                    </div>
                    <div class="form-group">
                        <label for="prof-cognom">Cognoms:</label>
                        <input type="text" id="prof-cognom" placeholder="Els teus cognoms" disabled>
                    </div>
                    <div class="form-group">
                        <label for="prof-email">Correu electrònic:</label>
                        <input type="email" id="prof-email" placeholder="correu@exemple.com" disabled>
                    </div>
                    <div class="form-group">
                        <label for="prof-data">Data de naixement:</label>
                        <input type="date" id="prof-data" disabled>
                    </div>
                    
                    <button type="button" id="btn-edit-profile" class="primary-btn">Editar Perfil</button>
                </form>
            </div>
        </main>

        <nav class="bottom-nav">
            <button id="nav-home" class="nav-item active">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </button>
            <button id="nav-profile" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Profile</span>
            </button>
        </nav>
    </div>

    <script src="data/data.js"></script>
    <script src="app.js"></script>
</body>
</html>
